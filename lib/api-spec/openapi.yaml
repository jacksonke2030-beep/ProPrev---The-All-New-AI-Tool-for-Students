openapi: 3.1.0
info:
  # Do not change the title, if the title changes, the import paths will be broken
  title: Api
  version: 0.1.0
  description: API specification
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: chat
    description: Chat operations
paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      description: Returns server health status
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
  /chat/config:
    get:
      operationId: getChatConfig
      tags: [chat]
      summary: Get chat configuration
      description: Returns assistant name and welcome message
      responses:
        "200":
          description: Chat config
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatConfig"
  /chat/message:
    post:
      operationId: sendMessage
      tags: [chat]
      summary: Send a chat message (SSE streaming)
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/MessageInput"
      responses:
        "200":
          description: SSE stream of response chunks
          content:
            text/event-stream:
              schema:
                type: string
  /chat/upload:
    post:
      operationId: uploadFile
      tags: [chat]
      summary: Upload a file for file search
      responses:
        "200":
          description: File uploaded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileUploadResult"
components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status
    ChatConfig:
      type: object
      properties:
        assistantName:
          type: string
        welcomeMessage:
          type: string
        model:
          type: string
        starterQuestions:
          type: array
          items:
            type: string
      required:
        - assistantName
        - welcomeMessage
        - model
        - starterQuestions
    MessageInput:
      type: object
      properties:
        message:
          type: string
        previousResponseId:
          type: ["string", "null"]
        attachedFileId:
          type: ["string", "null"]
      required:
        - message
    FileUploadResult:
      type: object
      properties:
        fileId:
          type: string
        filename:
          type: string
      required:
        - fileId
        - filename
